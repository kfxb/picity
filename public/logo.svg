<svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="160" height="160" rx="32" fill="#0B1E3D"/>

  <!-- City skyline (gold, subtle) -->
  <g fill="#F0B429" opacity="0.22">
    <rect x="14" y="92" width="9"  height="36"/>
    <rect x="12" y="84" width="13" height="8"/>
    <rect x="25" y="98" width="7"  height="30"/>
    <rect x="34" y="86" width="11" height="42"/>
    <rect x="32" y="76" width="15" height="10"/>
    <rect x="105" y="90" width="11" height="38"/>
    <rect x="103" y="80" width="15" height="10"/>
    <rect x="118" y="96" width="7"  height="32"/>
    <rect x="127" y="84" width="9"  height="44"/>
    <rect x="138" y="94" width="7"  height="34"/>
    <rect x="136" y="84" width="11" height="10"/>
  </g>

  <!-- Network node lines -->
  <g opacity="0.35">
    <line x1="28"  y1="46" x2="80"  y2="18" stroke="#F0B429" stroke-width="1"/>
    <line x1="132" y1="46" x2="80"  y2="18" stroke="#F0B429" stroke-width="1"/>
    <line x1="132" y1="46" x2="148" y2="70" stroke="#4A90E2" stroke-width="1"/>
    <line x1="28"  y1="46" x2="12"  y2="70" stroke="#4A90E2" stroke-width="1"/>
    <line x1="80"  y1="18" x2="80"  y2="2"  stroke="#F0B429" stroke-width="1"/>
  </g>

  <!-- Network nodes -->
  <circle cx="80"  cy="18" r="3.5" fill="#F0B429"/>
  <circle cx="28"  cy="46" r="3"   fill="#F0B429"/>
  <circle cx="132" cy="46" r="3"   fill="#F0B429"/>
  <circle cx="148" cy="70" r="2.5" fill="#4A90E2"/>
  <circle cx="12"  cy="70" r="2.5" fill="#4A90E2"/>

  <!-- Letter P stem -->
  <rect x="48" y="42" width="11" height="76" rx="5.5" fill="url(#pg)"/>

  <!-- Letter P bowl -->
  <path d="M59 42 Q104 42 104 68 Q104 94 59 94"
        stroke="url(#pg)" stroke-width="11"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- π symbol (gold) inside bowl -->
  <rect x="68" y="52" width="26" height="5" rx="2.5" fill="#F0B429"/>
  <rect x="71" y="57" width="5"  height="20" rx="2.5" fill="#F0B429"/>
  <rect x="88" y="57" width="5"  height="20" rx="2.5" fill="#F0B429"/>

  <!-- Gold accent badge top-right -->
  <circle cx="120" cy="40" r="7"   fill="#F0B429"/>
  <circle cx="120" cy="40" r="3.5" fill="#0B1E3D"/>

  <defs>
    <linearGradient id="pg" x1="48" y1="42" x2="104" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#1A56C4"/>
    </linearGradient>
  </defs>
</svg>
